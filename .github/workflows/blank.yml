name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # מושך את כל היסטוריית הגיט כדי למנוע שגיאות דחיפה

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests selenium webdriver-manager

      - name: Run bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "bot@weather-oracle.com"
          git add index.html
          # הפקודה הבאה מבצעת עדכון גם אם לא השתנו נתונים
          git commit -m "Oracle Update: $(date)" || exit 0
          # החלף את main ב-master אם זה שם הענף שלך
          git push origin main --force
