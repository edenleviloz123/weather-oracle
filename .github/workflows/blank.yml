name: Polymarket Weather Oracle v6.3

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # ייעול ההתקנה למניעת כשלים

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Weather Bot
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git pull --rebase origin main # פותר את בעיית ה-Rejected
          git commit -m "V6.3 Stable Deployment" || exit 0
          git push origin main
