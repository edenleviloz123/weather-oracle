name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot and verify file
        run: |
          python weather_bot.py
          echo "--- BOTS FINISHED. CHECKING FILES: ---"
          ls -la
          echo "--- CHECKING IF NEW RUN ID EXISTS: ---"
          grep "FORCED UPDATE RUN ID" index.html || echo "COULD NOT FIND RUN ID!"

      - name: Commit and push changes
        run: |
          git config --local user.name "Idol-Oracle-Bot"
          git config --local user.email "bot@idolstudios.com"
          git add index.html
          echo "--- GIT STATUS: ---"
          git status
          git commit -m "Oracle Auto-Sync: $(date +'%Y-%m-%d %H:%M:%S')" || echo "Git says: No changes to commit"
          git push origin main
