name: Polymarket Weather Oracle v6.5

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # הסרנו את שורת ה-cache שגרמה לשגיאה

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Weather Bot
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git pull --rebase origin main
          git commit -m "V6.5 Final Deployment - Fix Build Error" || exit 0
          git push origin main
