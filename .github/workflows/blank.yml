name: Update Weather Oracle

on:
  schedule:
    - cron: '0 * * * *' # רץ כל שעה עגולה
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests py-clob-client # כאן אנחנו מתקינים את הכלים של פולימרקט

      - name: Run weather bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "WeatherBot"
          git config --global user.body "weather-bot@github.com"
          git add index.html
          git commit -m "Auto-update: Live Market Sync" || exit 0
          git push
