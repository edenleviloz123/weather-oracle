name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write # נותן לבוט רשות לכתוב קבצים לתוך הגיטהאב שלך

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests selenium webdriver-manager

      - name: Run bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "bot@weather-oracle.com"
          git add index.html
          git commit -m "Auto-update dashboard v7.2" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push
