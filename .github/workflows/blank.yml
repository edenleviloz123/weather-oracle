name: Weather Oracle Update

on:
  schedule:
    - cron: '*/10 * * * *' # רץ כל 10 דקות
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run weather bot
        run: python weather_bot.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages # וודא שזה תואם להגדרות ה-Pages שלך
