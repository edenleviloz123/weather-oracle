name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *' # רץ בכל שעה עגולה
  workflow_dispatch: # מאפשר לך להריץ ידנית

permissions:
  contents: write # קריטי: מאפשר לבוט לשנות קבצים ב-Repository

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests selenium webdriver-manager

      - name: Run bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "bot@weather-oracle.com"
          git add index.html
          # פקודה שדורסת התנגשויות ודוחפת את האתר המעודכן בכוח
          git commit -m "Full Oracle Update v7.5" || exit 0
          git pull --rebase --autostash origin main
          git push origin main
