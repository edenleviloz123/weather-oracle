name: Polymarket Weather Oracle v6.6

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Weather Bot
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # פתרון לשגיאה 128:
          git add index.html
          git stash                          # שומר את ה-index.html שיצרנו בצד
          git pull --rebase origin main      # מושך עדכונים מהשרת באופן נקי
          git stash pop                      # מחזיר את ה-index.html שלנו
          
          git add index.html
          git commit -m "V6.6 Auto-update with Stash/Pop" || exit 0
          git push origin main
