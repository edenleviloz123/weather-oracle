name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # מושך את כל ההיסטוריה כדי למנוע בעיות דחיפה

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # הכרחת קומיט גם אם גיט חושב שאין שינוי (למרות שהוספנו חותמת זמן)
          git commit -m "Oracle Update: $(date)" || exit 0
          git push origin main --force
