name: Weather Oracle Update

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # עודכן ל-v4

      - name: Set up Python
        uses: actions/setup-python@v5 # עודכן ל-v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run weather bot
        run: python weather_bot.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # עודכן ל-v3 (תואם ל-artifact v4)
        with:
          path: ./

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # עודכן ל-v4
