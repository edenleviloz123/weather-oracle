name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# הצהרת הרשאות מפורשת בתוך הקוד
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # עדכון לגרסה הכי חדישה
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # בדיקה אם יש בכלל שינוי כדי למנוע שגיאות מיותרות
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Oracle Auto-Update: $(date)"
            git push origin main
          fi
