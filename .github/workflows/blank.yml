name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 * * * *' # רץ כל שעה עגולה
  workflow_dispatch: # מאפשר הפעלה ידנית

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --local user.name "Idol-Oracle-Bot"
          git config --local user.email "bot@idolstudios.com"
          git add index.html
          git commit -m "Oracle Auto-Sync: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push origin main --force
