name: Polymarket Weather Oracle

# הבוט ירוץ כל 15 דקות וגם ניתן להרצה ידנית
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # הוספתי כאן את pytz בשביל השעונים
        run: pip install requests pytz

      - name: Run Weather Bot
        # כאן הבוט "מושך" את המפתח הסודי שהגדרת ב-Secrets
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python weather_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update Polymarket Arbitrage Data" || exit 0
          git push
